<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <style>
        body {
            font-family: 'Tahoma', sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 0;
            direction: rtl;
        }

        .container {
            width: 100%;
            padding: 40px 0;
            display: flex;
            justify-content: center;
        }

        .card {
            background: #ffffff;
            padding: 25px 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 550px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        h2 {
            color: #0078D7;
            margin-bottom: 20px;
        }

        p {
            font-size: 16px;
            color: #444444;
            line-height: 1.8;
        }

        .footer {
            margin-top: 20px;
            font-size: 14px;
            color: #777;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card">
            <h2>تم تأكيد البريد الإلكتروني</h2>

            <p>شكرًا لك على تأكيد البريد الإلكتروني.</p>
            <p>سيتم تفعيل حسابك بعد مراجعة بياناتك من قبل فريق المنصة.</p>
            <p>سنقوم بإعلامك عند اكتمال عملية المراجعة.</p>

            <div class="footer">
                شكراً لاستخدامك منصّتنا.
            </div>
        </div>
    </div>

</body>
</html>
