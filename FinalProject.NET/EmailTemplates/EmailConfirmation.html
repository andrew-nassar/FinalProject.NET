<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تأكيد البريد الإلكتروني</title>
</head>

<body style="background:#f4f4f4; font-family:Tahoma, sans-serif; padding:0; margin:0;">
    <table width="100%" cellspacing="0" cellpadding="0" style="padding: 30px 0;">
        <tr>
            <td align="center">

                <table width="600" cellpadding="0" cellspacing="0"
                       style="background:#ffffff; border-radius:10px; padding:30px;">

                    <!-- Header -->
                    <tr>
                        <td align="center" style="padding-bottom:20px;">
                            <h2 style="color:#333; margin:0;">
                                تأكيد البريد الإلكتروني
                            </h2>
                        </td>
                    </tr>

                    <!-- Message -->
                    <tr>
                        <td style="color:#444; font-size:16px; line-height:1.8; padding:10px 20px;">
                            مرحبًا 👋،
                            <br><br>
                            شكرًا لتسجيلك! قبل أن تبدأ باستخدام حسابك، نحتاج إلى التأكد من أن هذا البريد الإلكتروني يخصّك.
                            <br><br>
                            اضغط على الزر التالي لتفعيل حسابك:
                        </td>
                    </tr>

                    <!-- Button -->
                    <tr>
                        <td align="center" style="padding: 20px 0;">
                            <a href="{{CONFIRMATION_LINK}}"
                               style="
                                background:#007bff;
                                color:#fff;
                                padding:14px 28px;
                                border-radius:6px;
                                text-decoration:none;
                                font-size:16px;
                                display:inline-block;">
                                تفعيل الحساب
                            </a>
                        </td>
                    </tr>

                    <!-- Alternative Link -->
                    <tr>
                        <td style="color:#777; font-size:14px; padding:0 20px 20px; line-height:1.7;">
                            لو الزر مش شغال، انسخ اللينك ده والصقه في المتصفح:
                            <br>
                            <span style="font-size:13px; direction:ltr; display:block; margin-top:6px; color:#0066cc;">
                                {{CONFIRMATION_LINK}}
                            </span>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td align="center" style="padding-top:15px; color:#aaa; font-size:12px;">
                            © 2025 جميع الحقوق محفوظة.
                        </td>
                    </tr>

                </table>

            </td>
        </tr>
    </table>
</body>
</html>
